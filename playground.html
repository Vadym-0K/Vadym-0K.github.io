<html>
     <head>
       <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
       <meta name="viewport" content="width-device-width, initial-scale=1.0">
       <title>Vad-Website-00/Playground</title>
       <LINK href="styles.css" rel="stylesheet" type="text/css">
       <style>
       @import url('https://fonts.googleapis.com/css2?family=Source+Code+Pro&display=swap');
       .parent {
            background-color: #37302c;
            height: 100px;
            width: 700px auto;
            animation: 1s linear forwards;
       }
       .child
       {
            background-color: #6454df;
            height: 100%;
            width: 50%;
            transition: transform 1s linear;
       }
       .parent:hover .child {
            animation: left-to-right 0.5s linear forwards alternate infinite;
       }
       .parent:active {
            animation: 1s linear forwards;

       }

       @keyframes left-to-right{
            0% {
                 transform: translateX(0%);
            }
            100% {
                 transform: translateX(100%);
                 background-color: #d52149;
            }
       }

       </style>
     </head>
     <script>
     function welcome()
     {
          document.getElementById("mainPlayground").style.backgroundColor = "#3f4b7a";
          document.getElementById("button3").style.display="none";
          document.getElementById("PGscreen2").style.display="block";
     }
     counter = 0;
     function level2()
     {
          var pass = prompt("Enter Password!", "");
          if(pass == "0101") {
               document.getElementById("demo").innerHTML = "Wow, you shouldn't know this!<br> Anyways, next page is under construction"
          }
          else if (pass != null) {
               counter +=1;
               if (counter == 1) {document.getElementById("demo").innerHTML =
               "Incorrect Pass<br><mark class=\"red\">You Have 3 more tries before we drone strike your location<br></mark>*** Hint, it's not '0101' ***";}
               if (counter == 2) {document.getElementById("demo").innerHTML =
               "Incorrect Pass<br><mark class=\"red\">You Have 2 more tries before we drone strike your location<br></mark>*** Hint, it's not '0101' ***";}
               if (counter == 3) {document.getElementById("demo").innerHTML =
               "Incorrect Pass<br><mark class=\"red\"><b>You Have 1 more tries before we drone strike your location<br></b></mark>*** Hint, it's not '0101' ***";}
               if (counter == 4) {
                    document.getElementById("boomscreen").style.display="block";
                    document.getElementById("PGscreen2").style.display="none";
               }
          }


     }
     </script>
<body>
     <button id="button3" name="button" onclick="welcome()">
     <div id="mainPlayground" >
          <mainFontWhiteCenter><br><mark class="red">DO NOT CLICK </mark></mainFontWhiteCenter>
     </div>
     </button>
     <div id="PGscreen2" >
          <mainFontWhite><br> >>You totally clicked!! :(<br><br> >>Ohh well ¯\_(ツ)_/¯<br><br>>>Here's what I have here, BUT shhh don't tell anyone <mark class="red"><b>****** TOP SECRET ******<b><br>&nbsp;</mark></<mainFontWhite>
               <div class="parent">
                    <div class="child">
                    </div>
               </div>
               <mainFontWhite>
                    <br>>>You know what? I now remember that I have a top notch security system, so BYE! <br> <br/>>>See you NEVER!!! <br/>&nbsp;
               </mainFontWhite>
               <button class="button4" name="button4" onclick="level2()">>> UP THE LVL >></button>
               <p id="demo"></p>

     </div>
     <div id="boomscreen">
     </div>
</body>
</html>
